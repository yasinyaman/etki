[project]
name = "etki-api"
version = "0.1.1"
description = "Stable plugin API for Etki — external-integration ports, normalized models and the plugin manifest contract."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
keywords = ["etki", "plugin-api", "adapter", "pmo"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "pydantic>=2.7",
]

[project.optional-dependencies]
# Contract-test suite for plugin authors (Faz 4 fills this package in).
conformance = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/etki_api"]
